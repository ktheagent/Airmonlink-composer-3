name: Audit Composer 3 Source

"on":
  push:
    branches: [main]
    paths:
      - "src/**"
      - "test/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate-composer-3.yml"
      - "docs/checkpoints/04-audit.trigger"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: audit-composer-3-main
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run and publish deterministic audit
        shell: bash
        run: |
          set -uo pipefail

          report="docs/checkpoints/04-full-test-audit.md"
          log_dir="/tmp/composer3-audit"
          mkdir -p docs/checkpoints "$log_dir"

          failures=0
          passed=0
          failed=0

          {
            echo "# Checkpoint 04 — Complete Composer 3 source audit"
            echo
            echo "Repository: \`${GITHUB_REPOSITORY}\`"
            echo "Branch: \`${GITHUB_REF_NAME}\`"
            echo "Commit: \`${GITHUB_SHA}\`"
            echo "Node: \`$(node --version)\`"
            echo "npm: \`$(npm --version)\`"
            echo
            echo "This report was generated from the exact checked-out commit."
            echo
            echo "## Required files"
            echo
          } > "$report"

          required=(
            src/bootstrap.js
            src/main.js
            src/preload.js
            src/ui/index.html
            src/ui/styles.css
            src/ui/app.js
            src/ui/dock-manager.js
            src/ui/publishing-controller.js
            package.json
            package-lock.json
          )
          for file in "${required[@]}"; do
            if test -f "$file"; then
              echo "- PASS \`$file\`" >> "$report"
            else
              echo "- FAIL missing \`$file\`" >> "$report"
              failures=1
            fi
          done

          {
            echo
            echo "## Forbidden legacy files"
            echo
          } >> "$report"

          forbidden=(
            src/ui/publishing-ui.js
            src/ui/publishing-exposure.js
            src/release-bootstrap.js
          )
          for file in "${forbidden[@]}"; do
            if test -e "$file"; then
              echo "- FAIL present \`$file\`" >> "$report"
              failures=1
            else
              echo "- PASS absent \`$file\`" >> "$report"
            fi
          done

          {
            echo
            echo "## JavaScript syntax"
            echo
          } >> "$report"

          syntax_files=(
            src/bootstrap.js
            src/main.js
            src/preload.js
            src/ui/app.js
            src/ui/dock-manager.js
            src/ui/publishing-controller.js
          )
          for file in "${syntax_files[@]}"; do
            log="$log_dir/syntax-$(basename "$file").log"
            if node --check "$file" >"$log" 2>&1; then
              echo "- PASS \`$file\`" >> "$report"
            else
              echo "- FAIL \`$file\`" >> "$report"
              {
                echo '```text'
                cat "$log"
                echo '```'
              } >> "$report"
              failures=1
            fi
          done

          {
            echo
            echo "## Lint"
            echo
          } >> "$report"

          if npm run lint >"$log_dir/lint.log" 2>&1; then
            echo "- PASS \`npm run lint\`" >> "$report"
          else
            echo "- FAIL \`npm run lint\`" >> "$report"
            {
              echo '```text'
              cat "$log_dir/lint.log"
              echo '```'
            } >> "$report"
            failures=1
          fi

          {
            echo
            echo "## Test files"
            echo
          } >> "$report"

          shopt -s nullglob
          test_files=(test/*.test.js)
          if test "${#test_files[@]}" -eq 0; then
            echo "- FAIL no test files found" >> "$report"
            failures=1
          fi

          for file in "${test_files[@]}"; do
            safe_name="$(basename "$file" .test.js)"
            log="$log_dir/${safe_name}.log"
            if node --test "$file" >"$log" 2>&1; then
              echo "- PASS \`$file\`" >> "$report"
              passed=$((passed + 1))
            else
              echo "- FAIL \`$file\`" >> "$report"
              {
                echo '```text'
                cat "$log"
                echo '```'
              } >> "$report"
              failed=$((failed + 1))
              failures=1
            fi
          done

          {
            echo
            echo "## Summary"
            echo
            echo "- Passing test files: \`${passed}\`"
            echo "- Failing test files: \`${failed}\`"
          } >> "$report"

          if test "$failures" -eq 0; then
            echo "- Audit conclusion: **PASS**" >> "$report"
          else
            echo "- Audit conclusion: **FAIL**" >> "$report"
          fi

          {
            echo
            echo "Not tested by this audit: Windows compilation, installed application identity, visual staff obstruction, real mouse docking, PDF/PNG page inspection, performance, printer, MIDI, or audio hardware."
          } >> "$report"

          git fetch origin main
          remote_main="$(git rev-parse origin/main)"
          if test "$remote_main" != "$GITHUB_SHA"; then
            echo "Refusing to publish a stale audit report: origin/main is $remote_main, audited commit is $GITHUB_SHA." >&2
            exit 2
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$report"

          if ! git diff --cached --quiet; then
            if ! git commit -m "Record complete Composer 3 source audit [skip ci]"; then
              echo "Failed to commit the audit report." >&2
              exit 3
            fi
            if ! git push origin HEAD:main; then
              echo "Failed to push the audit report." >&2
              exit 4
            fi
          fi

          exit "$failures"
