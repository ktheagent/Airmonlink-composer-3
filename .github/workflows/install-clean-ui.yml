name: Diagnose clean renderer bundle

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/install-clean-ui.yml"
      - "migration/ui-install.trigger"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct bundle and record hash
        shell: bash
        run: |
          set -euo pipefail
          cat migration/ui-bundle/part-*.txt > /tmp/composer3-ui.b64
          base64 --decode /tmp/composer3-ui.b64 > /tmp/composer3-ui.tar.gz
          actual="$(sha256sum /tmp/composer3-ui.tar.gz | awk '{print $1}')"
          expected="df147a5ad3f85d385b097f6e4d58a68ac7938db2a9d0f4e7f0c43f48aa4c9b36"
          mkdir -p docs/checkpoints
          {
            echo "# Clean renderer bundle diagnostic"
            echo
            echo "Repository: \`ktheagent/Airmonlink-composer-3\`"
            echo "Branch: \`main\`"
            echo "Expected SHA-256: \`$expected\`"
            echo "Actual SHA-256: \`$actual\`"
            echo
            if [ "$actual" = "$expected" ]; then
              echo "Result: **MATCH**"
            else
              echo "Result: **MISMATCH — RELEASE BLOCKED**"
            fi
            echo
            echo "Archive listing:"
            echo '```'
            tar -tzf /tmp/composer3-ui.tar.gz || true
            echo '```'
          } > docs/checkpoints/03B-bundle-diagnostic.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/checkpoints/03B-bundle-diagnostic.md
          git commit -m "Record clean renderer bundle diagnostic [skip ci]"
          git push origin HEAD:main
          test "$actual" = "$expected"
