name: Install verified clean renderer

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/install-clean-ui.yml"
      - "scripts/install-clean-ui.sh"
      - "migration/ui-install.trigger"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: composer-3-clean-renderer-install
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct, validate, and commit renderer
        shell: bash
        run: bash scripts/install-clean-ui.sh
