name: Install verified clean renderer

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/install-clean-ui.yml"
      - "migration/ui-install.trigger"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify clean renderer
        shell: bash
        run: |
          set -euo pipefail
          cat migration/ui-bundle/part-*.txt > /tmp/composer3-ui.b64
          base64 --decode /tmp/composer3-ui.b64 > /tmp/composer3-ui.tar.gz
          echo "df147a5ad3f85d385b097f6e4d58a68ac7938db2a9d0f4e7f0c43f48aa4c9b36  /tmp/composer3-ui.tar.gz" | sha256sum --check -
          tar -xzf /tmp/composer3-ui.tar.gz
          node --check src/bootstrap.js
          node --check src/ui/app.js
          node --check src/ui/dock-manager.js
          node --check src/ui/publishing-controller.js
          node --test test/v126-clean-renderer-migration.test.js

      - name: Save checkpoint and commit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/checkpoints
          cat > docs/checkpoints/03B-clean-renderer-installed.md <<'EOF'
          # Checkpoint 3B — Clean renderer source installed

          Repository: `ktheagent/Airmonlink-composer-3`
          Branch: `main`
          Decision: **RELEASE BLOCKED**

          The SHA-256-verified clean renderer bundle was reconstructed and installed. The legacy `src/ui` was not imported. Installed source includes a new renderer shell, structural staff-safe grid layout, direct publishing controller, mouse docking manager, clean bootstrap, and dedicated migration tests.

          Verification at this checkpoint:
          - bundle SHA-256 matched `df147a5ad3f85d385b097f6e4d58a68ac7938db2a9d0f4e7f0c43f48aa4c9b36`;
          - JavaScript syntax checks passed;
          - dedicated clean-renderer migration tests passed.

          Still unverified:
          - full regression suite;
          - compiled Windows runtime;
          - staff visibility across all required window states;
          - real PDF and PNG output inspection;
          - installed application identity;
          - performance measurements;
          - human acceptance and hardware testing.

          No download is approved by this checkpoint.
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/bootstrap.js src/ui test/v126-clean-renderer-migration.test.js docs/checkpoints/03B-clean-renderer-installed.md
          if git diff --cached --quiet; then
            echo "No renderer changes to commit."
            exit 0
          fi
          git commit -m "Install verified clean renderer checkpoint [skip ci]"
          git push origin HEAD:main
