name: Validate and Build Windows Release

"on":
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows-build.yml"

permissions:
  contents: read

concurrency:
  group: windows-build-main
  cancel-in-progress: false

jobs:
  windows:
    name: Validate and build Windows x64
    runs-on: windows-latest
    timeout-minutes: 75
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Confirm green source audit still applies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $reportPath = "docs/checkpoints/04-full-test-audit.md"

          if (-not (Test-Path $reportPath)) {
            throw "The committed source audit report is missing."
          }

          $reportLines = @(Get-Content $reportPath)

          if ($reportLines -notcontains '- Audit conclusion: **PASS**') {
            throw "The committed source audit is not green."
          }

          if ($reportLines -notcontains '- Failing test files: `0`') {
            throw "The comitted source audit records failing test files."
          }

          $commitLine = $reportLines |
            Where-Object { $_ -match '^Commit: `([0-9a-f]{40})`$' } |
            Select-Object -First 1

          if (-not $commitLine) {
            throw "The audited commit SHA was not found in the report."
          }

          $auditedCommit = [regex]::Match(
            $commitLine,
            '^Commit: `([0-9a-f]{40})`$'
          ).Groups[1].Value

          $changedFiles = @(git diff --name-only "$auditedCommit..HEAD")
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to compare the audited commit with HEAD"”
          }

          $criticalChanges = @(
            $changedFiles | Where-Object {
              $_ -match '^(src/|test/|scripts/|package\.json$|package-lock\.json$)'
            }
          )

          if ($criticalChanges.Count -gt 0) {
            throw "Application or validation files changed after the green audit: $($criticalChanges -join ', ')"
          }

      - name: Parse PowerShell release validator
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tokens = $null
          $errors = $null

          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path ".\scripts\windows-release-validation.ps1"),
            [ref]$tokens,
            [ref]$errors
          )

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            throw "PowerShell release validator contains $($errors.Count) parse error(s)."
          }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Normalize lockfile registry and install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force validation | Out-Null

          Remove-Item Env:NODE_ENV -ErrorAction SilentlyContinue
          Remove-Item Env:NPM_CONFIG_PRODUCTION -ErrorAction SilentlyContinue
          Remove-Item Env:NPM_CONFIG_OMIT -ErrorAction SilentlyContinue

          $lockPath = "package-lock.json"
          $internalPrefix = "https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/"
          $publicPrefix = "https://registry.npmjs.org/"

          $lockText = Get-Content $lockPath -Raw
          $replacementCount = ([regex]::Matches(
            $lockText,
            [regex]::Escape($internalPrefix)
          )).Count

          if ($replacementCount -gt 0) {
            $lockText = $lockText.Replace($internalPrefix, $publicPrefix)
          }

          if ($lockText.Contains("packages.applied-caas-gateway1.internal.api.openai.org")) {
            throw "The normalized lockfile still contains the internal npm host."
          }

          if ($lockText.Contains("registry.npmjs.org/artifactory/")) {
            throw "The normalized lockfile contains an invalid npmjs Artifactory path."
          }

          & node -e "const fs=require('node:fs'); JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));" $lockPath
          if ($LASTEXITCODE -ne 0) {
            throw "The normalized package-lock.json failed Node JSON.parse validation."
          }

          [System.IO.File]::WriteAllText(
            (Resolve-Path $lockPath).Path,
            $lockText,
            [System.Text.UTF8Encoding]::new($false)
          )

          "Normalized lockfile tarball URLs: $replacementCount" |
            Set-Content -Encoding ascii validation\lockfile-registry-normalization.txt

          $registry = "https://registry.npmjs.org/"
          npm config set registry $registry --location=user
          npm config set fetch-retries 5 --location=user
          npm config set fetch-retry-factor 2 --location=user
          npm config set fetch-retry-mintimeout 20000 --location=user
          npm config set fetch-retry-maxtimeout 120000 --location=user
          npm config set fetch-timeout 300000 --location=user

          $configuredRegistry = (npm config get registry).Trim()
          if ($LASTEXITCODE -ne 0 -or $configuredRegistry -ne $registry) {
            throw "npm registry configuration failed. Expected $registry; found $configuredRegistry."
          }

          node --version | Tee-Object -FilePath validation\node-version.txt
          npm --version | Tee-Object -FilePath validation\npm-version.txt
          $configuredRegistry | Set-Content -Encoding ascii validation\npm-registry.txt

          $cachePath = Join-Path $env:RUNNER_TEMP "airmonlink-npm-cache-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          Remove-Item $cachePath -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $cachePath | Out-Null
          $env:NPM_CONFIG_CACHE = $cachePath

          npm ci --include=dev --no-audit --no-fund --prefer-online
          $installExitCode = $LASTEXITCODE

          if ($installExitCode -ne 0) {
            $npmLogs = Join-Path $cachePath "_logs"
            if (Test-Path $npmLogs) {
              Copy-Item $npmLogs "validation\npm-logs" -Recurse -Force
            }
            throw "npm ci failed with exit code $installExitCode."
          }

          if (-not (Test-Path "node_modules\electron-builder\cli.js")) {
            throw "electron-builder CLI is missing."
          }

          $electron = Get-ChildItem "node_modules\electron\dist" -Filter electron.exe -Recurse |
            Select-Object -First 1

          if (-not $electron) {
            throw "electron.exe was not installed."
          }

     - name: Lint JavaScript
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          npm run lint
          if ($LASTEXITCODE -ne 0) {
            throw "Lint failed with exit code $LASTEXITCODE."
          }

      - name: Run complete automated test suite
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force validation | Out-Null

          $tests = @(
            Get-ChildItem test -Filter *.test.js |
              Sort-Object Name |
              ForEach-Object { $_.FullName }
          )

          if ($tests.Count -eq 0) {
            throw "No test files were found."
          }

          & node --test @tests > validation\tests.tap 2>&1
          $exitCode = $LASTEXITCODE
          Get-Content validation\tests.tap

          if ($exitCode -ne 0) {
            throw "Tests failed with exit code $exitCode."
          }

          $summary = Select-String -Path validation\tests.tap -Pattern "^# tests (\d+)$" |
            Select-Object -Last 1

          if (-not $summary) {
            throw "TAP test count was not found."
          }

          $count = [int]$summary.Matches[0].Groups[1].Value
          if ($count -lt 160) {
            throw "Expected at least 160 tests; found $count."
          }

          if (Select-String -Path validation\tests.tap -Pattern "^# fail [1-9]") {
            throw "TAP reported failures."
          }

      - name: Build Windows installer and portable application
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmd.exe /d /s /c "npm run dist:win > validation\windows-build.log 2>&1"
          $exitCode = $LASTEXITCODE
          Get-Content validation\windows-build.log

          if ($exitCode -ne 0) {
            throw "Windows packaging failed with exit code $exitCode."
          }

      - name: Validate Windows release and built renderer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & .\scripts\windows-release-validation.ps1 `
            -ReleaseDirectory release `
            -ValidationDirectory validation `
            -ExpectedBuild 18

          if ($LASTEXITCODE -ne 0) {
            throw "Windows release validation failed with exit code $LASTEXITCODE."
          }

      - name: Upload Windows release
        uses: actions/upload-artifact@v4
        with:
          name: Airmonlink-Composer-1.1.0-Build18-Windows
          path: |
            release/Airmonlink-Composer-1.1.0-Build18-Setup.exe
            release/Airmonlink-Composer-1.1.0-Build18-Portable.exe
            release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Airmonlink-Composer-1.1.0-Build18-Windows-Validation
          path: validation/**
          if-no-files-found: warn
          retention-days: 30
