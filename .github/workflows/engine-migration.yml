name: Import proven engine without legacy interface

"on":
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: current
          ref: main
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: ktheagent/Airmonlink-composer-2
          path: legacy
          ref: main
      - name: Import engine only
        shell: bash
        run: bash current/scripts/import-engine-only.sh
